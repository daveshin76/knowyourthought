<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 독해 사고과정 분석 시스템</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f39c12;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
            --border-radius: 12px;
        }
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 { color: var(--primary-color); margin-bottom: 5px; }
        .subtitle { color: #666; font-size: 0.9em; }

        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .question-box {
            background: #eef2f7;
            padding: 15px;
            border-left: 5px solid var(--primary-color);
            margin-bottom: 20px;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .option-btn {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            font-size: 1rem;
        }
        .option-btn:hover { border-color: var(--primary-color); background: #f0f7ff; }
        .option-btn.selected { border-color: var(--primary-color); background: #e1effe; font-weight: bold; }

        #analysis-result {
            display: none;
            margin-top: 20px;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .diagnosis-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .badge-correct { background: #d4edda; color: #155724; }
        .badge-error { background: #f8d7da; color: #721c24; }

        .ai-prompt-box {
            background: #2d3436;
            color: #dfe6e9;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            white-space: pre-wrap;
            font-size: 0.9em;
            margin-top: 15px;
            position: relative;
        }
        .copy-btn {
            position: absolute;
            right: 10px;
            top: 10px;
            background: #636e72;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📚 AI 독해 사고과정 진단기</h1>
        <p class="subtitle">학생이 선택한 오답을 기반으로 논리적 결함을 분석합니다.</p>
    </header>

    <div class="card">
        <h3>[테스트 지문]</h3>
        <div class="question-box">
            "많은 사람들은 엄격한 마감 기한이 긴박감을 조성하여 항상 생산성을 높인다고 믿는다. <strong>하지만(However)</strong>, 연구에 따르면 지나치게 경직된 시간 제한은 실제로는 창의성을 억제하고 번아웃을 초래할 수 있다..."
        </div>
        <p><strong>Q. 위 글의 요지로 가장 적절한 것은?</strong></p>
        <div class="options-grid">
            <button class="option-btn" onclick="analyze(1)">① 엄격한 마감은 창의성을 저해하고 번아웃을 유발할 수 있다.</button>
            <button class="option-btn" onclick="analyze(2)">② 마감 기한은 업무의 긴박함을 조성하여 생산성을 높여준다.</button>
            <button class="option-btn" onclick="analyze(3)">③ 창의성과 생산성은 현대 사회에서 가장 중요한 가치이다.</button>
            <button class="option-btn" onclick="analyze(4)">④ 번아웃을 피하기 위해 연구원들은 휴식 시간을 늘려야 한다.</button>
        </div>
    </div>

    <div id="analysis-result" class="card">
        <div id="diagnosis-header"></div>
        <h2 id="result-title" style="margin-top: 0;"></h2>
        <p id="result-desc"></p>
        
        <hr>
        <h4>🤖 AI 분석용 프롬프트 (교사용)</h4>
        <div class="ai-prompt-box" id="prompt-text"></div>
    </div>
</div>

<script>
    const logicData = {
        1: {
            title: "정답 (Logic Mastery)",
            badge: "badge-correct",
            desc: "축하합니다! 지문의 '통념-반박' 구조를 정확히 파악했습니다. 'However' 뒤에 숨겨진 저자의 진짜 의도를 찾아내는 능력이 탁월합니다.",
            type: "None"
        },
        2: {
            title: "통념 고착 (Fixed Notion)",
            badge: "badge-error",
            desc: "첫 문장의 'Many people believe'에 매몰되었습니다. 도입부의 대중적 견해와 필자의 주장을 구분하지 못하고, 반전 시그널(However)을 무시하는 경향이 있습니다.",
            type: "Fixed Notion"
        },
        3: {
            title: "과도한 일반화 (Broad Generalization)",
            badge: "badge-error",
            desc: "지문의 소재(창의성, 생산성)는 맞지만, 본문에서 언급하지 않은 '사회적 가치'까지 확대 해석했습니다. 지문의 경계 내에서 사고하는 훈련이 필요합니다.",
            type: "Generalization"
        },
        4: {
            title: "단어 매칭 (Word Matching)",
            badge: "badge-error",
            desc: "지문 끝에 나온 'Burnout'이라는 단어에 시각적으로 반응했습니다. 문장 간의 논리적 관계보다는 눈에 띄는 단어 하나로 전체를 판단하는 경향이 강합니다.",
            type: "Word Matching"
        }
    };

    function analyze(choice) {
        // UI 효과
        document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
        document.querySelectorAll('.option-btn')[choice-1].classList.add('selected');

        const result = logicData[choice];
        const resultDiv = document.getElementById('analysis-result');
        const promptDiv = document.getElementById('prompt-text');
        
        resultDiv.style.display = 'block';
        document.getElementById('diagnosis-header').innerHTML = `<span class="diagnosis-badge ${result.badge}">${result.title}</span>`;
        document.getElementById('result-title').innerText = choice === 1 ? "정확한 독해입니다!" : "사고 오류 진단 결과";
        document.getElementById('result-desc').innerText = result.desc;

        // 프롬프트 생성
        let prompt = `[학생 분석 데이터]\n- 선택: ${choice}번\n- 진단명: ${result.title}\n- 분석내용: ${result.desc}\n\n[명령]\n위 학생은 독해 시 ${result.type} 오류를 범하고 있습니다. 이를 교정하기 위해 다음 수업에서 제시할 '한 문장 처방전'과 맞춤형 연습 문제를 추천해줘.`;
        promptDiv.innerText = prompt;
    }
</script>

</body>
</html>
